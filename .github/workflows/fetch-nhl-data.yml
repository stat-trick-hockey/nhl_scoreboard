name: Fetch NHL Live Data

on:
  schedule:
    # Every 5 minutes during NHL game hours (noon–2 AM UTC = 8 AM–10 PM ET)
    - cron: '*/5 12-23 * * *'
    - cron: '*/5 0-2  * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No pip installs needed — script uses only stdlib (urllib, json, pathlib)

      - name: Fetch NHL data
        # Uses the free, no-key NHL Web API: https://api-web.nhle.com/v1/
        run: python scripts/fetch_nhl.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || \
            git commit -m "chore: update NHL data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
